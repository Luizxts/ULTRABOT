<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRABOT PRO MAX - DASHBOARD</title>
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #00ff00;
            --text-secondary: #cccccc;
            --accent-green: #00ff00;
            --accent-red: #ff4444;
            --accent-orange: #ff9900;
            --accent-blue: #0099ff;
            --border-color: #00ff00;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
        }
        
        .card h2 {
            color: var(--accent-green);
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-label {
            color: var(--text-secondary);
        }
        
        .status-value {
            font-weight: bold;
        }
        
        .online { color: var(--accent-green); }
        .offline { color: var(--accent-red); }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        
        .btn:hover {
            background: var(--accent-green);
            color: var(--bg-primary);
        }
        
        .last-updated {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 ULTRABOT PRO MAX SUPER</h1>
            <p>Dashboard em Tempo Real</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>🎯 STATUS PRINCIPAL</h2>
                <div id="status-content">
                    <div class="status-item">
                        <span class="status-label">Status:</span>
                        <span class="status-value" id="bot-status">Carregando...</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Conexão:</span>
                        <span class="status-value" id="conexao-status">Carregando...</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Ciclos:</span>
                        <span class="status-value" id="ciclos-count">0</span>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>📊 PERFORMANCE</h2>
                <div id="performance-content">
                    <div class="status-item">
                        <span class="status-label">Trades:</span>
                        <span class="status-value" id="trades-count">0</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Lucro:</span>
                        <span class="status-value" id="lucro-total">$0.00</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Saldo:</span>
                        <span class="status-value" id="saldo-atual">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>📈 ATIVIDADES RECENTES</h2>
            <div id="signals-content">
                <div class="status-item">
                    <span>Sistema inicializado</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>🔧 CONTROLES</h2>
            <div class="controls">
                <button class="btn" onclick="refreshData()">🔄 Atualizar</button>
                <button class="btn" onclick="healthCheck()">❤️ Health Check</button>
            </div>
            <div id="health-status" style="margin-top: 10px;"></div>
        </div>
        
        <div class="last-updated">
            <p>Última atualização: <span id="last-updated-time">--:--:--</span></p>
        </div>
    </div>

    <script>
        // Atualizar dados do dashboard
        async function updateDashboard() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                // Atualizar status
                document.getElementById('bot-status').textContent = data.bot_status;
                document.getElementById('conexao-status').textContent = 
                    data.conexao_exchange ? '✅ CONECTADO' : '❌ OFFLINE';
                document.getElementById('conexao-status').className = 
                    data.conexao_exchange ? 'status-value online' : 'status-value offline';
                
                // Atualizar performance
                document.getElementById('ciclos-count').textContent = data.performance.ciclos;
                document.getElementById('trades-count').textContent = data.performance.trades;
                document.getElementById('lucro-total').textContent = '$' + data.performance.lucro.toFixed(2);
                document.getElementById('saldo-atual').textContent = '$' + data.performance.saldo.toFixed(2);
                
                // Atualizar atividades
                const signalsContent = document.getElementById('signals-content');
                signalsContent.innerHTML = '';
                data.ultimos_sinais.forEach(signal => {
                    const div = document.createElement('div');
                    div.className = 'status-item';
                    div.innerHTML = `<span>${signal}</span>`;
                    signalsContent.appendChild(div);
                });
                
                // Atualizar hora
                document.getElementById('last-updated-time').textContent = data.ultima_atualizacao;
                
            } catch (error) {
                console.error('Erro ao atualizar dashboard:', error);
            }
        }
        
        // Health check
        async function healthCheck() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                const healthStatus = document.getElementById('health-status');
                healthStatus.innerHTML = '<span class="online">✅ Sistema saudável</span>';
                
                setTimeout(() => {
                    healthStatus.innerHTML = '';
                }, 3000);
                
            } catch (error) {
                const healthStatus = document.getElementById('health-status');
                healthStatus.innerHTML = '<span class="offline">❌ Erro no health check</span>';
            }
        }
        
        // Refresh manual
        function refreshData() {
            updateDashboard();
        }
        
        // Inicializar dashboard
        document.addEventListener('DOMContentLoaded', function() {
            updateDashboard();
            setInterval(updateDashboard, 5000);
        });
    </script>
</body>
</html>
