<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRABOT - Trading Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1f2937;
            --light: #f3f4f6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .profit { color: var(--success); }
        .loss { color: var(--danger); }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-mode { background: var(--primary); color: white; }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .trade-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .trade-profit { color: var(--success); font-weight: bold; }
        .trade-loss { color: var(--danger); font-weight: bold; }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🤖 ULTRABOT PRO</h1>
            <p>Robô de Trading Inteligente - Modo Ganancioso Ativado</p>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="loading">Carregando estatísticas...</div>
        </div>
        
        <div class="controls">
            <button class="btn btn-start" onclick="startBot()">🚀 Iniciar Trading</button>
            <button class="btn btn-stop" onclick="stopBot()">🛑 Parar Trading</button>
            <button class="btn btn-mode" onclick="changeMode('aggressive')">🔥 Modo Agressivo</button>
            <button class="btn btn-mode" onclick="changeMode('conservative')">🛡️ Modo Conservador</button>
        </div>
        
        <div class="info-panel">
            <h3>📈 Últimas Atualizações</h3>
            <div id="updatesList">
                <div class="trade-item">
                    <span>Sistema inicializado</span>
                    <span class="trade-profit">✅</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <h3>Status</h3>
                        <div class="stat-value ${data.status === 'running' ? 'profit' : 'loss'}">
                            ${data.status === 'running' ? '🟢 RODANDO' : '🔴 PARADO'}
                        </div>
                        <p>${data.mode?.toUpperCase() || 'N/A'}</p>
                    </div>
                    <div class="stat-card">
                        <h3>Saldo</h3>
                        <div class="stat-value profit">
                            $${data.balance?.total_equity?.toFixed(2) || '0.00'}
                        </div>
                        <p>Disponível: $${data.balance?.available_balance?.toFixed(2) || '0.00'}</p>
                    </div>
                    <div class="stat-card">
                        <h3>Lucro Hoje</h3>
                        <div class="stat-value ${data.daily_stats?.total_profit >= 0 ? 'profit' : 'loss'}">
                            $${data.daily_stats?.total_profit?.toFixed(2) || '0.00'}
                        </div>
                        <p>Win Rate: ${(data.daily_stats?.win_rate * 100)?.toFixed(1) || '0'}%</p>
                    </div>
                    <div class="stat-card">
                        <h3>Trades Hoje</h3>
                        <div class="stat-value">${data.daily_stats?.total_trades || 0}</div>
                        <p>${data.daily_stats?.winning_trades || 0} ✅ / ${data.daily_stats?.losing_trades || 0} ❌</p>
                    </div>
                `;
                
            } catch (error) {
                console.error('Erro dashboard:', error);
            }
        }
        
        async function startBot() {
            try {
                await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'aggressive' })
                });
                updateDashboard();
                addUpdate('Trading iniciado no modo agressivo');
            } catch (error) {
                console.error('Erro iniciar:', error);
            }
        }
        
        async function stopBot() {
            try {
                await fetch('/api/stop', { method: 'POST' });
                updateDashboard();
                addUpdate('Trading parado');
            } catch (error) {
                console.error('Erro parar:', error);
            }
        }
        
        async function changeMode(mode) {
            try {
                await fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: mode })
                });
                updateDashboard();
                addUpdate(`Modo alterado para: ${mode}`);
            } catch (error) {
                console.error('Erro modo:', error);
            }
        }
        
        function addUpdate(message) {
            const updatesList = document.getElementById('updatesList');
            const updateItem = document.createElement('div');
            updateItem.className = 'trade-item';
            updateItem.innerHTML = `
                <span>${new Date().toLocaleTimeString()} - ${message}</span>
                <span class="trade-profit">🔄</span>
            `;
            updatesList.insertBefore(updateItem, updatesList.firstChild);
        }
        
        // Atualizar a cada 5 segundos
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
