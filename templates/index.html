<!DOCTYPE html>
<html>
<head>
    <title>ULTRABOT PRO MAX - DASHBOARD</title>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="30">
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #0f0f23; 
            color: #00ff00; 
            margin: 0; 
            padding: 20px;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
        }
        .card { 
            background: #1a1a2e; 
            padding: 20px; 
            margin: 10px; 
            border-radius: 10px; 
            border: 1px solid #00ff00; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
        }
        .real { color: #00ff00; }
        .simulacao { color: #ff9900; }
        .offline { color: #ff4444; }
        .online { color: #00ff00; }
        .signal-buy { color: #00ff00; }
        .signal-sell { color: #ff4444; }
        .signal-hold { color: #ff9900; }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .status-online { background: #00ff00; }
        .status-offline { background: #ff4444; }
        .status-warning { background: #ff9900; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 ULTRABOT PRO MAX SUPER - DASHBOARD REAL-TIME</h1>
            <p>🕒 Atualizado automaticamente a cada 5 segundos</p>
        </div>
        
        <div class="grid">
            <div class="card">
                <h2>📊 PERFORMANCE</h2>
                <div id="performance">
                    <p>Carregando dados...</p>
                </div>
            </div>
            
            <div class="card">
                <h2>🎯 STATUS TRADING</h2>
                <div id="status">
                    <p>Carregando dados...</p>
                </div>
            </div>
            
            <div class="card">
                <h2>🛡️ RISCO & CONEXÕES</h2>
                <div id="risk">
                    <p>Carregando dados...</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>📈 ÚLTIMOS SINAIS & ATIVIDADES</h2>
            <div id="signals">
                <p>Carregando dados...</p>
            </div>
        </div>

        <div class="card">
            <h2>🔧 CONTROLES</h2>
            <button onclick="location.reload()">🔄 Atualizar Manualmente</button>
            <button onclick="healthCheck()">❤️ Health Check</button>
            <span id="health-status" style="margin-left: 20px;"></span>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                // Atualizar Performance
                document.getElementById('performance').innerHTML = `
                    <p>► Ciclos: <strong>${data.performance.ciclos}</strong></p>
                    <p>► Trades: <strong>${data.performance.trades}</strong></p>
                    <p>► Saldo: <strong>$${data.performance.saldo.toFixed(2)}</strong></p>
                    <p>► Lucro/Prejuízo: <strong>$${data.performance.lucro.toFixed(2)}</strong></p>
                    <p>► Vitórias: <strong>${data.performance.vitorias}</strong></p>
                    <p>► Derrotas: <strong>${data.performance.derrotas}</strong></p>
                `;
                
                // Atualizar Status
                const statusClass = data.modalidade === 'REAL' ? 'real' : 'simulacao';
                const conexaoClass = data.conexao_exchange ? 'online' : 'offline';
                const conexaoIndicator = data.conexao_exchange ? 'status-online' : 'status-offline';
                
                document.getElementById('status').innerHTML = `
                    <p><span class="status-indicator ${conexaoIndicator}"></span> 
                       Modo: <strong class="${statusClass}">${data.modalidade}</strong></p>
                    <p>► Conectado: <strong class="${conexaoClass}">${data.conexao_exchange ? '✅ ONLINE' : '❌ OFFLINE'}</strong></p>
                    <p>► Status Bot: <strong>${data.bot_status}</strong></p>
                    <p>► Última Atualização: <strong>${data.ultima_atualizacao}</strong></p>
                `;
                
                // Atualizar Sinais
                let signalsHTML = '';
                if (data.ultimos_sinais && data.ultimos_sinais.length > 0) {
                    data.ultimos_sinais.forEach(signal => {
                        const signalClass = signal.includes('BUY') ? 'signal-buy' : 
                                          signal.includes('SELL') ? 'signal-sell' : 'signal-hold';
                        signalsHTML += `<p class="${signalClass}">${signal}</p>`;
                    });
                } else {
                    signalsHTML = '<p>Nenhum sinal ou atividade recente</p>';
                }
                document.getElementById('signals').innerHTML = signalsHTML;
                
            } catch (error) {
                console.error('Erro ao atualizar dashboard:', error);
                document.getElementById('status').innerHTML = '<p class="offline">❌ Erro ao conectar com o servidor</p>';
            }
        }
        
        async function healthCheck() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                document.getElementById('health-status').innerHTML = '✅ Sistema saudável';
                setTimeout(() => {
                    document.getElementById('health-status').innerHTML = '';
                }, 3000);
            } catch (error) {
                document.getElementById('health-status').innerHTML = '❌ Erro no health check';
            }
        }
        
        // Atualizar a cada 5 segundos
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
